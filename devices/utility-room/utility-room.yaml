---
esphome:
  name: utility-room

esp8266:
  board: d1_mini

packages:
  base: !include ../../esphome_common/base.yaml
  wifi: !include ../../esphome_common/wifi.yaml

binary_sensor:
  - platform: gpio
    pin:
      number: D6
      mode:
        input: true
        pullup: true
    name: Back Door - Left
    device_class: door

  - platform: gpio
    pin:
      number: D7
      mode:
        input: true
        pullup: true
    name: Back Door - Right
    device_class: door

  - platform: gpio
    pin:
      number: D5
      mode:
        input: true
        pullup: true
    name: Utility Room Door
    device_class: door

  - platform: gpio
    pin:
      number: RX
      mode:
        input: true
        pullup: true
    name: Utility Room Doors Tamper
    device_class: tamper

  - platform: gpio
    pin: D0
    name: Utility Room Motion
    device_class: motion
    filters:
      - delayed_off: 15s

sensor:
  - platform: wifi_signal
    name: Utility Room WiFi Signal Strength
    update_interval: 60s

  - platform: adc
    pin: A0
    name: Utility Room Ambient Brightness
    device_class: illuminance
    unit_of_measurement: "%"
    update_interval: 1s
    accuracy_decimals: 0
    filters:
      - multiply: 100
      - delta: 2%
